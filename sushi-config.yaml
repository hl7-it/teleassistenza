    Organization Mapping: map-organization-ta.html
    Encounter Mapping: map-encounter-ta.html
    Appointment Mapping: map-appointment-ta.html
    Observation Mapping: map-observation-ta.html
    Procedure Mapping: map-procedure-ta.html
    MedicationRequest Mapping: map-medicationrequest-ta.html
    AllergyIntolerance Mapping: map-allergy-ta.html
    Device Mapping: map-device-ta.html
