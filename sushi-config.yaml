    FHIR Spec: new-tab http://hl7.org/fhir/R4/index.html
    Downloads: downloads.html  
  Artifacts: artifacts.html


# ╭───────────────────────────Less Common Implementation Guide Properties──────────────────────────╮
# │  Uncomment the properties below to configure additional properties on the ImplementationGuide  │
# │  resource. These properties are less commonly needed than those above.                         │
# ╰────────────────────────────────────────────────────────────────────────────────────────────────╯
#
# Those who need more control or want to add additional details to the contact values can use
# contact directly and follow the format outlined in the ImplementationGuide resource and
# ContactDetail.
#
# contact:
#   - name: Bob Smith
#     telecom:
#       - system: email # phone | fax | email | pager | url | sms | other
#         value: bobsmith@example.org
#         use: work
#
#
# The global property corresponds to the IG.global property, but it
# uses the type as the YAML key and the profile as its value. Since
# FHIR does not explicitly disallow more than one profile per type,
# neither do we; the value can be a single profile URL or an array
# of profile URLs. If a value is an id or name, SUSHI will replace
# it with the correct canonical when generating the IG JSON.
#
# global:
#   Patient: http://example.org/fhir/StructureDefinition/my-patient-profile
#   Encounter: http://example.org/fhir/StructureDefinition/my-encounter-profile
#
#
# The resources property corresponds to IG.definition.resource.
# SUSHI can auto-generate all of the resource entries based on
# the FSH definitions and/or information in any user-provided
# JSON or XML resource files. If the generated entries are not
# sufficient or complete, however, the author can add entries
# here. If the reference matches a generated entry, it will
# replace the generated entry. If it doesn't match any generated
# entries, it will be added to the generated entries. The format
# follows IG.definition.resource with the following differences:
#   * use IG.definition.resource.reference.reference as the YAML key.
#   * if the key is an id or name, SUSHI will replace it with the
#     correct URL when generating the IG JSON.
#   * specify "omit" to omit a FSH-generated resource from the
#     resource list.
#   * if the exampleCanonical is an id or name, SUSHI will replace
#     it with the correct canonical when generating the IG JSON.
#   * groupingId can be used, but top-level groups syntax may be a
#     better option (see below).
# The following are simple examples to demonstrate what this might
# look like:
#
# resources:
#   Patient/my-example-patient:
#     name: My Example Patient
#     description: An example Patient
#     exampleBoolean: true
#   Patient/bad-example: omit
#
#
# Groups can control certain aspects of the IG generation.  The IG
# documentation recommends that authors use the default groups that
# are provided by the templating framework, but if authors want to
# use their own instead, they can use the mechanism below.  This will
# create IG.definition.grouping entries and associate the individual
# resource entries with the corresponding groupIds. If a resource
# is specified by id or name, SUSHI will replace it with the correct
# URL when generating the IG JSON.
#
groups:
  # ── Profili ──────────────────────────────────────────────────────────────────
  GroupPianoTA:
    name: Profili - Piano di Teleassistenza
    description: Profili FHIR utilizzati per la rappresentazione del Piano di Teleassistenza (documento di pianificazione del percorso assistenziale).
    resources:
    - StructureDefinition/BundlePianoTeleassistenza
    - StructureDefinition/BundlePianoTeleassistenzaTransaction
    - StructureDefinition/CompositionPianoTA
    - StructureDefinition/CarePlanPianoDiCuraTeleassistenza
    - StructureDefinition/ActivityDefinitionTeleassistenza

  GroupRelazioneTA:
    name: Profili - Relazione di Teleassistenza
    description: Profili FHIR utilizzati per la rappresentazione della Relazione di Teleassistenza (documento conclusivo del percorso assistenziale).
    resources:
    - StructureDefinition/BundleRelazioneTeleassistenza
    - StructureDefinition/BundleRelazioneTeleassistenzaTransaction
    - StructureDefinition/CompositionRelazioneTeleassistenza
    - StructureDefinition/CarePlanRelazioneTA

  GroupRisorseCliniche:
    name: Profili - Risorse Correlate
    description: Profili FHIR delle risorse cliniche e organizzative utilizzate nel contesto della Teleassistenza.
    resources:
    - StructureDefinition/PatientTeleassistenza
    - StructureDefinition/PractitionerTeleassistenza
    - StructureDefinition/PractitionerRoleTeleassistenza
    - StructureDefinition/OrganizationT1
    - StructureDefinition/OrganizationT2
    - StructureDefinition/OrganizationT3
    - StructureDefinition/EncounterTeleassistenza
    - StructureDefinition/AppointmentTeleassistenza
    - StructureDefinition/ObservationTeleassistenza
    - StructureDefinition/ObservationTeleassistenzaNarrative
    - StructureDefinition/ProcedureTeleassistenza
    - StructureDefinition/ServiceRequestTeleassistenza
    - StructureDefinition/MedicationRequestTeleassistenza
    - StructureDefinition/MedicationStatementTeleassistenza
    - StructureDefinition/AllergyIntoleranceTeleassistenza
    - StructureDefinition/Deviceteleassistenza

  # ── Tipi di dato ed Estensioni ───────────────────────────────────────────────
  GroupTipiDatoEstensioni:
    name: Tipi di Dato ed Estensioni
    description: Profili di tipi di dato base ed estensioni FHIR utilizzati nel contesto della Teleassistenza.
    resources:
    - StructureDefinition/AddressItTelemedicina
    - StructureDefinition/recordCertification
    - StructureDefinition/birth-place-ita
    - StructureDefinition/address-dug
    - StructureDefinition/address-official

  # ── Terminologie ─────────────────────────────────────────────────────────────
  GroupValueSet:
    name: ValueSet
    description: Value set utilizzati nel contesto della Teleassistenza per la codifica delle informazioni cliniche e amministrative.
    resources:
    - ValueSet/VstipoIdentificatore
    - ValueSet/minsan-asl
    - ValueSet/minsan-idStrutture
    - ValueSet/minsan-idStruttureInterne
    - ValueSet/specialita-mediche
    - ValueSet/vsspecialityPractitionerRole
    - ValueSet/VsCatalogoNazionalePrestazioni
    - ValueSet/ValueSetCatalogoNazionalePrestazioni
    - ValueSet/diagnosi-icd9cm
    - ValueSet/istat-dug
    - ValueSet/tipologia-piano
    - ValueSet/vs-tipo-ricetta

  GroupCodeSystem:
    name: CodeSystem
    description: Code system utilizzati nel contesto della Teleassistenza per la definizione dei sistemi di codifica locali e nazionali.
    resources:
    - CodeSystem/CodesystemMinisteroSaluteASL
    - CodeSystem/branca-prestazione
    - CodeSystem/CodesystemCatalogoNazionalePrestazioni
    - CodeSystem/CsCatalogoNazionalePrestazioni
    - CodeSystem/diagnosi-icd9cm
    - CodeSystem/dug
    - CodeSystem/csspecialityPractitionerRole
    - CodeSystem/csTipologiaPiano
    - CodeSystem/cs-tipo-ricetta

  # ── Esempi ───────────────────────────────────────────────────────────────────
  GroupEsempiPiano:
    name: Esempi - Piano di Teleassistenza
    description: >-
      Esempi relativi al Piano di Teleassistenza della paziente Maria Rossi (CF: RSSMRA71E01H501E),
      affetta da scompenso cardiaco cronico (CHF, NYHA II), presa in carico dal Dr. Mario Bianchi
      (Cardiologo, U.O. Cardiologia, Osp. Sandro Pertini, ASL Roma 1).
      Il piano copre il periodo 01/09/2025 – 31/08/2026 e prevede telemonitoraggio quotidiano dei
      parametri vitali e contatti infermieristici settimanali via videochiamata.
    resources:
    - Bundle/EsempioPianoDiTeleassistenza
    - Bundle/EsempioPianoDiTeleassistenzaTransaction
    - Composition/composition-pta-1
    - CarePlan/careplan-tele-1
    - ActivityDefinition/actdef-teleass

  GroupEsempiRelazione:
    name: Esempi - Relazione di Teleassistenza
    description: >-
      Esempi relativi alla Relazione di Teleassistenza del primo mese (01/09/2025 – 30/09/2025)
      per la paziente Maria Rossi. La relazione documenta il buon controllo pressorio raggiunto
      (PA media 128/82 mmHg), l'assenza di eventi avversi, la diagnosi di scompenso cardiaco
      congestizio (ICD9 428.0) e le indicazioni cliniche per la prosecuzione del percorso.
    resources:
    - Bundle/EsempioRelazioneDiTeleassistenza
    - Bundle/EsempioRelazioneDiTeleassistenzaTransaction
    - Composition/composition-rel-1
    - CarePlan/careplan-rel-1
    - Observation/obs-anamnesi-1
    - Observation/Observation-quesito
    - Observation/obs-confronto-1
    - Observation/obs-referto-1
    - Observation/obs-suggerimenti-1
    - Observation/obs-accertamenti-1
    - Observation/obs-precedenti-1

  GroupEsempiRisorse:
    name: Esempi - Risorse Cliniche e Amministrative
    description: >-
      Risorse cliniche e amministrative di supporto allo scenario di teleassistenza per scompenso
      cardiaco: paziente Maria Rossi (ASL Roma 1), Dr. Mario Bianchi (U.O. Cardiologia, Osp. Pertini),
      encounter del 10/09/2025, ServiceRequest, Procedure, dispositivo pulsossimetro, allergia a
      penicillina, terapia corrente con Furosemide e terapia consigliata con Ramipril + Carvedilolo.
    resources:
    - Patient/patient-mrossi
    - Practitioner/pract-bianchi
    - PractitionerRole/practrole-bianchi-gom
    - Organization/org-assistenza
    - Organization/osp-pertini
    - Organization/uo-cardiologia-pertini
    - Encounter/enc-tele-1
    - Appointment/9c7e5f13-47bd-4a0a-a6bb-c9e39fd3a908
    - Observation/obs-dx-icd9
    - Observation/84f911ee-b09d-4325-a3f3-a973a0c5ad8f
    - Observation/c2a2b1ea-9d7e-41b9-83a5-cc2e71c0b865
    - ServiceRequest/ServiceRequestTeleassistenzaExample
    - Procedure/EsempioProcedureTeleassistenza
    - Device/EsempioDPulsossimetro
    - MedicationRequest/medreq-terapia-1
    - AllergyIntolerance/1360bd6a-3855-48d3-aa33-96a9d961bb94
    - MedicationStatement/e62c9f1d-9c0b-4433-853b-06ec5074f19a
